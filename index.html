<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <!-- Expense Info -->

    <h1 class="col-12 text-center mt-3">Expense Tracker App</h1>

    <div class="info-box col-12 mt-5 " >
        <div class="row d-flex justify-content-between">
            <div class="expense col-6 text-center">
                <h2>Exepense</h2>
            </div>
            <div class="income col-6 text-center">
                <h2>Income</h2>
            </div>
        </div>
    </div>

    <!-- Add Data Fields -->
    <form action="" >
        <div class="col-12 mt-5 ">
            <div class="row ms-2 mx-2">
                    <div class=" col-12 col-lg-3 col-md-6">
                        <span>Name</span>
                        <input type="text" id="name">
                    </div>
                    <div class=" col-12 col-lg-3 col-md-6">
                        <span>Amount</span>
                        <input type="number" id="amount">
                    </div>
                    <div class=" col-12 col-lg-3 col-md-6">
                        <span>Type</span>
                        <select name="expense-type" id="expense-type">
                            <option value="income">income</option>
                            <option value="expense">expense</option>
                        </select>
                    </div>
                    <div class=" col-12 col-lg-3 col-md-6">
                        <span>Select Date</span>
                        <input type="Date" id="date">
                    </div>
                    
                   
            </div>

        </div>
    </form>             
    <div class="col-12 col-lg-12 mt-3 text-center">
        <button class="btn btn-primary" id="submitBtn">Click Here for Add</button>
    </div>
    <!-- Fetch Data Table -->

    <table class="table text-center mt-5">
        <thead>
            <th>Name</th>
            <th>Amount</th>
            <th>Type</th>
            <th>Date</th>
            <th>Edit</th>
            <th>Delete</th>
        </thead>
        <tbody id="tableBody">

        </tbody>
    </table>
    

    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./index.js" type="module"></script>
</body>
</html>
